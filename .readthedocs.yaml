version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.10"
  jobs:
    post_build:
      - mkdir -p $READTHEDOCS_OUTPUT/html/
      # Use a shell glob to exclude the _readthedocs directory
      # This tells the shell: "Copy everything that doesn't start with _"
      - cp -rt $READTHEDOCS_OUTPUT/html/ [!_]*
