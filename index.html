<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Sigma Bundler</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="icon" type="image/png" href="icon.svg" />
    </head>
    <body>
        <header>
            <input
                type="text"
                class="search-bar"
                id="searchInput"
                placeholder="Search games..."
                autocomplete="off"
            />
            <button id="message" class="news-btn" onclick="alert('woah you clicked the button you\'re so sigma')">
                bit.ly/alpinegaming
            </button>
            <button id="newsBtn" class="news-btn">
                News
                <span id="updateBadge" class="update-badge" style="display:none;">●</span>
            </button>
            <div id="badgeFilter"></div>
        </header>

        <!-- News Modal -->
        <div id="newsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Updates</h2>
                    <button id="closeModal" class="close-btn">&times;</button>
                </div>
                <div class="modal-tabs">
                    <button class="tab-btn active" data-tab="changelog">Changelog</button>
                    <button class="tab-btn" data-tab="about">About</button>
                </div>
                <div class="modal-body">
                    <div id="changelog" class="tab-content active">
                        <h3>Changelog</h3>
                        <div id="changelogContent"></div>
                    </div>
                    <div id="about" class="tab-content">
                        <h3>About</h3>
                        <div id="aboutContent"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="scrollArea" class="clusterize">
            <div class="game-list">
                <div id="contentArea" class="clusterize-content"></div>
            </div>
        </div>

        <script src="clusterize.js"></script>
        <script src="script.js"></script>
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-Y9RWXNH1HP"></script>
        <script>
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          gtag('js', new Date());
        
          gtag('config', 'G-Y9RWXNH1HP');
        </script>
    </body>
</html>
